<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{url_for('static', filename='css/style.css')}}"
    />
    <title>pizza</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div class="site-container">
    <div class="header">
      <div class="brand">
        <h1>pizzas</h1>
        <nav class="top-nav">
          <a href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('index') }}">Orders</a>
          {% if session.get('username') %}
            <span class="muted" style="margin-left:8px">Signed in as {{ session.get('username') }}</span>
            <a href="{{ url_for('logout') }}">Logout</a>
            {% if session.get('is_owner') %}
              <a href="{{ url_for('owner_dashboard') }}">Owner</a>
            {% endif %}
          {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
          {% endif %}
        </nav>
      </div>

      <img src="{{ url_for('static', filename='images/Cheese.jpg') }}" alt="Cheese">

      <div class="add-order">
        <h1>new order:</h1>
        <form action="{{url_for('add')}}" method="POST">
            <input type="text" placeholder="name", name="name">
            <input type="text" placeholder="type", name="pizza">
            <button type="submit"></button>
        
        </form>
        
    </div>
    </div>
    {% block content %}

    {% endblock %}
    </div>
   </body>
</html>
